services:
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    ports:
      - "10002:10002"
    command: azurite-table --tableHost 0.0.0.0

  authagonal:
    build:
      context: ..
      dockerfile: demos/custom-server/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - Storage__ConnectionString=DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;TableEndpoint=http://azurite:10002/devstoreaccount1;
      - Issuer=http://localhost:8080
      - Oidc__Issuer=http://localhost:8080
      - SamlProviders__0__ConnectionId=entra
      - SamlProviders__0__ConnectionName=Drawboard Entra ID
      - SamlProviders__0__EntityId=https://sso.demo.authagonal.drawboard.com
      - SamlProviders__0__MetadataLocation=https://login.microsoftonline.com/4901e942-075f-4600-bfda-4c66954606cc/federationmetadata/2007-06/federationmetadata.xml?appid=68b150fb-11df-436e-b1f3-405a99262401
      - SamlProviders__0__AllowedDomains__0=drawboard.com
    depends_on:
      - azurite

  sample-api:
    build:
      context: ..
      dockerfile: demos/sample-app/SampleApp.Api/Dockerfile
    ports:
      - "5001:8080"
    environment:
      - Auth__Authority=http://authagonal:8080
      - Auth__Audience=sample-app
      - Auth__AllowHttp=true
      - Cors__Origins__0=http://localhost:3000
    depends_on:
      - authagonal

  frontend:
    build:
      context: ..
      dockerfile: demos/sample-app/frontend/Dockerfile
    ports:
      - "3000:8080"
    environment:
      - AUTH_SERVER=http://localhost:8080
      - REDIRECT_URI=http://localhost:3000/callback
      - API_BASE=http://sample-api:8080
    depends_on:
      - sample-api

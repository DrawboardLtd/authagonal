name: Release

on:
  push:
    tags: ['v*']

env:
  DOCKERHUB_SERVER: drawboardci/authagonal
  DOCKERHUB_MIGRATION: drawboardci/authagonal-migration
  DOCKERHUB_DEMO_SERVER: drawboardci/authagonal-demo-server
  DOCKERHUB_DEMO_SAMPLE_API: drawboardci/authagonal-demo-sample-api
  DOCKERHUB_DEMO_FRONTEND: drawboardci/authagonal-demo-frontend

jobs:
  publish-nuget:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Set version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Pack
        run: |
          dotnet pack src/Authagonal.Core/Authagonal.Core.csproj -c Release -p:Version=${{ steps.version.outputs.version }} -o nupkgs
          dotnet pack src/Authagonal.Storage/Authagonal.Storage.csproj -c Release -p:Version=${{ steps.version.outputs.version }} -o nupkgs
          dotnet pack src/Authagonal.Server/Authagonal.Server.csproj -c Release -p:Version=${{ steps.version.outputs.version }} -o nupkgs

      - name: Push to NuGet
        run: dotnet nuget push nupkgs/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Wait for NuGet indexing
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "Waiting for Authagonal.Server $VERSION to appear on NuGet..."
          for i in $(seq 1 30); do
            if curl -sf "https://api.nuget.org/v3-flatcontainer/authagonal.server/index.json" | grep -q "\"$VERSION\""; then
              echo "Package indexed after ~$(( i * 10 )) seconds"
              exit 0
            fi
            echo "  attempt $i/30 — not yet indexed, waiting 10s..."
            sleep 10
          done
          echo "::error::Timed out waiting for NuGet indexing (5 minutes)"
          exit 1

  publish-npm:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: login-app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm run build

      - name: Set version from tag
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version

      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Wait for npm indexing
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Waiting for @drawboard/authagonal-login@$VERSION on npm..."
          for i in $(seq 1 20); do
            if npm view "@drawboard/authagonal-login@$VERSION" version 2>/dev/null | grep -q "$VERSION"; then
              echo "Package indexed after ~$(( i * 5 )) seconds"
              exit 0
            fi
            echo "  attempt $i/20 — not yet indexed, waiting 5s..."
            sleep 5
          done
          echo "::error::Timed out waiting for npm indexing"
          exit 1

  docker:
    needs: [publish-nuget, publish-npm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: drawboardci
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (server)
        id: meta-server
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_SERVER }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=long

      - name: Extract metadata (migration)
        id: meta-migration
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_MIGRATION }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=long

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta-server.outputs.tags }}
          labels: ${{ steps.meta-server.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push migration image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.migration
          push: true
          tags: ${{ steps.meta-migration.outputs.tags }}
          labels: ${{ steps.meta-migration.outputs.labels }}
          cache-from: type=gha,scope=migration
          cache-to: type=gha,mode=max,scope=migration

      - name: Extract metadata (demo-server)
        id: meta-demo-server
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_DEMO_SERVER }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=long

      - name: Extract metadata (demo-sample-api)
        id: meta-demo-sample-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_DEMO_SAMPLE_API }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=long

      - name: Extract metadata (demo-frontend)
        id: meta-demo-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_DEMO_FRONTEND }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=long

      - name: Build and push demo server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: demos/custom-server/Dockerfile
          push: true
          tags: ${{ steps.meta-demo-server.outputs.tags }}
          labels: ${{ steps.meta-demo-server.outputs.labels }}
          cache-from: type=gha,scope=demo-server
          cache-to: type=gha,mode=max,scope=demo-server

      - name: Build and push demo sample API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: demos/sample-app/SampleApp.Api/Dockerfile
          push: true
          tags: ${{ steps.meta-demo-sample-api.outputs.tags }}
          labels: ${{ steps.meta-demo-sample-api.outputs.labels }}
          cache-from: type=gha,scope=demo-sample-api
          cache-to: type=gha,mode=max,scope=demo-sample-api

      - name: Build and push demo frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: demos/sample-app/frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-demo-frontend.outputs.tags }}
          labels: ${{ steps.meta-demo-frontend.outputs.labels }}
          cache-from: type=gha,scope=demo-frontend
          cache-to: type=gha,mode=max,scope=demo-frontend

  deploy-demo:
    needs: docker
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy auth server
        uses: azure/container-apps-deploy-action@v2
        with:
          resourceGroup: authagonal-demo
          containerAppName: authagonal-auth
          imageToDeploy: drawboardci/authagonal-demo-server:sha-${{ github.sha }}

      - name: Deploy sample API
        uses: azure/container-apps-deploy-action@v2
        with:
          resourceGroup: authagonal-demo
          containerAppName: authagonal-api
          imageToDeploy: drawboardci/authagonal-demo-sample-api:sha-${{ github.sha }}

      - name: Deploy frontend
        uses: azure/container-apps-deploy-action@v2
        with:
          resourceGroup: authagonal-demo
          containerAppName: authagonal-frontend
          imageToDeploy: drawboardci/authagonal-demo-frontend:sha-${{ github.sha }}
